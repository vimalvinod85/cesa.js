<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>My Interactive Presentation</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/theme/dracula.min.css">
    </head>
    <body>
        <div class="reveal">
            <div class="slides">

                <section>
                    <h1>My Presentation</h1>
                    <p>Built with code, but no coding required.</p>
                    <p><small>Press the spacebar to move forward</small></p>
                </section>

                <section>
                    <h2>Visual Impact</h2>
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndmZ6Z3R6Z3R6/3o7TKSjPqcKGRwS8M0/giphy.gif" alt="Rocket GIF">
                </section>

                <section>
                    <h2>Live Data Visualization</h2>
                    <iframe src="https://flo.uri.sh/visualisation/10850235/embed" 
                            style="width: 100%; height: 500px; border: none;" 
                            allowfullscreen allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media"></iframe>
                </section>

                <section data-background-video="https://static.videezy.com/system/resources/previews/000/012/345/original/particle_wave.mp4" data-background-video-loop>
                    <h2 style="color: white; text-shadow: 2px 2px 4px #000;">Cinematic Finish</h2>
                    <p style="color: white;">This video plays on a loop behind your text.</p>
                </section>

            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.js"></script>
        <script>
            Reveal.initialize({
                hash: true, // This allows people to link to specific slides
                controls: true,
                progress: true,
                center: true
            });
        </script>
    </body>
</html>
